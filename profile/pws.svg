<svg
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .ps-stroke {
          stroke: #1a1a1a;
        }
      }
      @media (prefers-color-scheme: dark) {
        .ps-stroke {
          stroke: #ffffff;
        }
      }
    </style>
  </defs>

  <!-- Terminal window with Material Design proportions -->
  <rect
    class="ps-stroke"
    x="2.5"
    y="3.5"
    width="19"
    height="17"
    rx="2.5"
    ry="2.5"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Title bar separator -->
  <line
    class="ps-stroke"
    x1="2.5"
    y1="7.5"
    x2="21.5"
    y2="7.5"
    stroke-width="1.5"
  />

  <!-- PowerShell prompt chevron (>) -->
  <path
    class="ps-stroke"
    d="M 7.5 12 L 10.5 14.5 L 7.5 17"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Input cursor line -->
  <line
    class="ps-stroke"
    x1="12"
    y1="15"
    x2="17"
    y2="15"
    stroke-width="1.5"
    stroke-linecap="round"
  />
</svg>
