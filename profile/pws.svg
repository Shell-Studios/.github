<svg
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    @media (prefers-color-scheme: light) {
      :root {
        --stroke-color: #000000;
      }
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --stroke-color: #ffffff;
      }
    }
  </style>

  <!-- Rounded outline box -->
  <rect
    x="3"
    y="5"
    width="18"
    height="14"
    rx="4"
    stroke="var(--stroke-color, black)"
    stroke-width="1.8"
  />

  <!-- > arrow -->
  <path
    d="M9 9 L13 12 L9 15"
    stroke="var(--stroke-color, black)"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- underscore -->
  <line
    x1="14"
    y1="15.5"
    x2="17"
    y2="15.5"
    stroke="var(--stroke-color, black)"
    stroke-width="1.8"
    stroke-linecap="round"
  />
</svg>
